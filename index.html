<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO - Prototype 1</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">
            <div id="status-panel" class="hud-panel top-left">
                <div class="label">STATUS</div>
                <div id="pursuit-status" class="value">SEARCH</div>
            </div>
            <div id="damage-panel" class="hud-panel top-right">
                <div class="label">DAMAGE</div>
                <div id="damage-value" class="value">0%</div>
            </div>
            <div id="district-panel" class="hud-panel bottom-right">
                <div class="label">DISTANCE</div>
                <div id="district-value" class="value">0 mi</div>
            </div>
        </div>
        <div id="event-screen" class="hidden">
            <div id="event-content"></div>
        </div>
        
        <!-- Touch Controls - Arrow Buttons -->
        <div id="touch-controls">
            <!-- Steering Arrows -->
            <div class="steering-section">
                <div class="arrow-grid">
                    <div class="arrow-empty"></div>
                    <button id="up-arrow-btn" class="arrow-button up-arrow">▲</button>
                    <div class="arrow-empty"></div>
                    
                    <button id="left-arrow-btn" class="arrow-button left-arrow">◄</button>
                    <div class="arrow-center"></div>
                    <button id="right-arrow-btn" class="arrow-button right-arrow">►</button>
                    
                    <div class="arrow-empty"></div>
                    <button id="down-arrow-btn" class="arrow-button down-arrow">▼</button>
                    <div class="arrow-empty"></div>
                </div>
            </div>

            <!-- Gas and Brake Buttons -->
            <div class="action-section">
                <button id="gas-button" class="control-button gas-btn">GAS</button>
                <button id="brake-button" class="control-button brake-btn">BRAKE</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
